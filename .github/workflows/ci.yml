name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Install, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_FIREBASE_API_KEY: ci-placeholder
      VITE_FIREBASE_AUTH_DOMAIN: gainstracker-fd8c9.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: gainstracker-fd8c9
      VITE_FIREBASE_STORAGE_BUCKET: gainstracker-fd8c9.firebasestorage.app
      VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      VITE_FIREBASE_APP_ID: 1:000000000000:web:0000000000000000000000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
